<svg xmlns="http://www.w3.org/2000/svg" width="600" height="400" viewBox="0 0 600 400">
  <defs>
    <linearGradient id="bg3" x1="0" y1="0" x2="1" y2="0.8">
      <stop offset="0%" stop-color="#010543"/>
      <stop offset="60%" stop-color="#0f1a68"/>
      <stop offset="100%" stop-color="#010543"/>
    </linearGradient>
    <radialGradient id="screenGlow" cx="0.5" cy="0.3" r="0.4">
      <stop offset="0%" stop-color="#3BB56D" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#010543" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="overlay" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="#010543" stop-opacity="0.9"/>
      <stop offset="50%" stop-color="#010543" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#010543" stop-opacity="0.1"/>
    </linearGradient>
  </defs>
  <rect width="600" height="400" fill="url(#bg3)"/>
  <rect width="600" height="400" fill="url(#screenGlow)"/>
  <!-- Large presentation screen -->
  <rect x="80" y="30" width="440" height="250" rx="10" fill="#0a0f3a" stroke="#1e2660" stroke-width="1.5"/>
  <rect x="92" y="42" width="416" height="224" rx="6" fill="#0d1340"/>
