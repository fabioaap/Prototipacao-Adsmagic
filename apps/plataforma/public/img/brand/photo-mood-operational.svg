  <circle cx="120" cy="340" r="14" fill="#0d1240" opacity="0.5"/>
  <rect x="106" y="356" width="28" height="30" rx="6" fill="#0a0f3a" opacity="0.4"/>
  <circle cx="200" cy="345" r="12" fill="#0d1240" opacity="0.4"/>
  <rect x="188" y="359" width="24" height="25" rx="5" fill="#0a0f3a" opacity="0.35"/>
