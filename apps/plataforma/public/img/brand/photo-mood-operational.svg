  <text x="125" y="138" font-family="Inter, system-ui, sans-serif" font-size="22" fill="#3BB56D" opacity="0.9" font-weight="700">4.2x</text>
  <rect x="235" y="95" width="105" height="55" rx="6" fill="#111850" stroke="#1e2660" stroke-width="0.5"/>
  <text x="245" y="115" font-family="Inter, system-ui, sans-serif" font-size="9" fill="#5B6BC0" opacity="0.6">CPL</text>
  <text x="245" y="138" font-family="Inter, system-ui, sans-serif" font-size="22" fill="#3BB56D" opacity="0.9" font-weight="700">R$12</text>
  <rect x="355" y="95" width="115" height="55" rx="6" fill="#111850" stroke="#1e2660" stroke-width="0.5"/>
  <text x="365" y="115" font-family="Inter, system-ui, sans-serif" font-size="9" fill="#5B6BC0" opacity="0.6">CONVERSIONS</text>
  <text x="365" y="138" font-family="Inter, system-ui, sans-serif" font-size="22" fill="#3BB56D" opacity="0.9" font-weight="700">+38%</text>
  <!-- Chart area -->
  <rect x="115" y="165" width="355" height="85" rx="4" fill="#0a0f3a"/>
  <polyline points="125,235 165,225 205,218 245,210 285,195 325,200 365,185 405,178 445,170" fill="none" stroke="#3BB56D" stroke-width="2" stroke-opacity="0.6" stroke-linecap="round"/>
  <polyline points="125,230 165,228 205,230 245,225 285,220 325,222 365,215 405,210 445,205" fill="none" stroke="#5B6BC0" stroke-width="1.5" stroke-opacity="0.35" stroke-dasharray="4 2"/>
  <!-- Screen stand -->
  <rect x="260" y="280" width="80" height="8" rx="2" fill="#1a2158"/>
  <rect x="280" y="288" width="40" height="15" rx="4" fill="#151c50"/>
