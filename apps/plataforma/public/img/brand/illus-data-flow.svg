<svg xmlns="http://www.w3.org/2000/svg" width="600" height="400" viewBox="0 0 600 400">
  <defs>
    <linearGradient id="bg5" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#010543"/>
      <stop offset="100%" stop-color="#0f1a68"/>
    </linearGradient>
    <linearGradient id="flowLine" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#3BB56D" stop-opacity="0"/>
      <stop offset="30%" stop-color="#3BB56D" stop-opacity="0.7"/>
      <stop offset="70%" stop-color="#5B6BC0" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#5B6BC0" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="barFill" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3BB56D" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#3BB56D" stop-opacity="0.15"/>
    </linearGradient>
  </defs>
  <rect width="600" height="400" fill="url(#bg5)"/>
  <!-- Subtle grid -->
  <g stroke="#1e2660" stroke-width="0.2" stroke-opacity="0.2">
    <line x1="0" y1="80" x2="600" y2="80"/><line x1="0" y1="160" x2="600" y2="160"/>
    <line x1="0" y1="240" x2="600" y2="240"/><line x1="0" y1="320" x2="600" y2="320"/>
  </g>
  <!-- Flow pipes (horizontal data streams) -->
  <rect x="0" y="90" width="600" height="3" rx="1.5" fill="url(#flowLine)"/>
  <rect x="0" y="170" width="600" height="2" rx="1" fill="url(#flowLine)" opacity="0.6"/>
  <rect x="0" y="250" width="600" height="2.5" rx="1.25" fill="url(#flowLine)" opacity="0.5"/>
  <!-- Stage 1: Input -->
  <rect x="40" y="110" width="100" height="80" rx="8" fill="#0d1340" stroke="#1e2660" stroke-width="1"/>
  <text x="58" y="133" font-family="Inter, system-ui, sans-serif" font-size="9" fill="#3BB56D" opacity="0.7" font-weight="600">INPUT</text>
  <rect x="55" y="142" width="70" height="8" rx="2" fill="#111850"/>
  <rect x="55" y="142" width="45" height="8" rx="2" fill="#3BB56D" opacity="0.3"/>
  <rect x="55" y="155" width="70" height="8" rx="2" fill="#111850"/>
  <rect x="55" y="155" width="60" height="8" rx="2" fill="#3BB56D" opacity="0.25"/>
  <rect x="55" y="168" width="70" height="8" rx="2" fill="#111850"/>
  <rect x="55" y="168" width="30" height="8" rx="2" fill="#5B6BC0" opacity="0.3"/>
  <!-- Arrow 1 -->
  <path d="M150 150 L180 150" stroke="#3BB56D" stroke-width="1.5" stroke-opacity="0.5" marker-end="url(#arrow)"/>
  <polygon points="180,145 192,150 180,155" fill="#3BB56D" opacity="0.5"/>
  <!-- Stage 2: Process -->
  <rect x="200" y="100" width="120" height="100" rx="8" fill="#0d1340" stroke="#1e2660" stroke-width="1"/>
  <text x="218" y="123" font-family="Inter, system-ui, sans-serif" font-size="9" fill="#5B6BC0" opacity="0.7" font-weight="600">PROCESS</text>
  <!-- Gear/cog abstraction -->
  <circle cx="260" cy="160" r="20" fill="none" stroke="#3BB56D" stroke-width="1.5" stroke-opacity="0.3" stroke-dasharray="6 3"/>
  <circle cx="260" cy="160" r="10" fill="#111850" stroke="#3BB56D" stroke-width="1" stroke-opacity="0.5"/>
  <circle cx="260" cy="160" r="4" fill="#3BB56D" opacity="0.4"/>
  <rect x="218" y="133" width="30" height="3" rx="1" fill="#5B6BC0" opacity="0.25"/>
  <rect x="218" y="140" width="20" height="3" rx="1" fill="#5B6BC0" opacity="0.18"/>
  <!-- Arrow 2 -->
  <polygon points="330,145 342,150 330,155" fill="#3BB56D" opacity="0.5"/>
  <!-- Stage 3: Output -->
  <rect x="350" y="105" width="110" height="90" rx="8" fill="#0d1340" stroke="#1e2660" stroke-width="1"/>
  <text x="368" y="128" font-family="Inter, system-ui, sans-serif" font-size="9" fill="#3BB56D" opacity="0.7" font-weight="600">OUTPUT</text>
  <!-- Mini chart -->
  <rect x="368" y="170" width="12" height="15" rx="2" fill="url(#barFill)"/>
  <rect x="385" y="160" width="12" height="25" rx="2" fill="url(#barFill)"/>
  <rect x="402" y="152" width="12" height="33" rx="2" fill="url(#barFill)"/>
  <rect x="419" y="145" width="12" height="40" rx="2" fill="url(#barFill)"/>
  <!-- Arrow 3 -->
  <polygon points="470,145 482,150 470,155" fill="#5B6BC0" opacity="0.4"/>
  <!-- Stage 4: Decision -->
  <polygon points="530,110 570,150 530,190 490,150" fill="#0d1340" stroke="#3BB56D" stroke-width="1.5" stroke-opacity="0.4"/>
  <text x="510" y="148" font-family="Inter, system-ui, sans-serif" font-size="8" fill="#3BB56D" opacity="0.7" font-weight="600">DECIDE</text>
  <text x="522" y="160" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#3BB56D" opacity="0.5">✓</text>
  <!-- Bottom feedback loop -->
  <path d="M530 195 C530 280 90 280 90 195" fill="none" stroke="#5B6BC0" stroke-width="1" stroke-opacity="0.2" stroke-dasharray="5 3"/>
  <polygon points="87,195 93,195 90,205" fill="#5B6BC0" opacity="0.2"/>
  <!-- Data particles in flow -->
  <circle cx="165" cy="91" r="3" fill="#3BB56D" opacity="0.5"/>
  <circle cx="295" cy="91" r="2.5" fill="#3BB56D" opacity="0.4"/>
  <circle cx="445" cy="91" r="2" fill="#5B6BC0" opacity="0.35"/>
  <circle cx="175" cy="170" r="2" fill="#3BB56D" opacity="0.3"/>
  <circle cx="340" cy="170" r="2" fill="#5B6BC0" opacity="0.25"/>
  <!-- Label -->
  <text x="30" y="380" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#3BB56D" opacity="0.6" letter-spacing="0.08em">ILLUSTRATION · DADOS EM MOVIMENTO</text>
</svg>