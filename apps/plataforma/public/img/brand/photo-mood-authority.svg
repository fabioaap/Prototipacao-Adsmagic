<svg xmlns="http://www.w3.org/2000/svg" width="600" height="400" viewBox="0 0 600 400">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#010543"/>
      <stop offset="100%" stop-color="#0f1a68"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.3" cy="0.4" r="0.6">
      <stop offset="0%" stop-color="#3BB56D" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#010543" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="desk" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a2158"/>
      <stop offset="100%" stop-color="#0d1340"/>
    </linearGradient>
    <filter id="blur1" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3"/>
    </filter>
  </defs>
  <!-- Background -->
  <rect width="600" height="400" fill="url(#bg)"/>
  <rect width="600" height="400" fill="url(#glow)"/>
  <!-- Desk surface -->
  <rect x="0" y="220" width="600" height="180" fill="url(#desk)" opacity="0.7"/>
  <line x1="0" y1="220" x2="600" y2="220" stroke="#3BB56D" stroke-opacity="0.12" stroke-width="1"/>
  <!-- Monitor silhouette -->
  <rect x="160" y="60" width="280" height="165" rx="8" fill="#0a0f3a" stroke="#1e2660" stroke-width="1.5"/>
  <rect x="170" y="70" width="260" height="140" rx="4" fill="#111850"/>
  <!-- Dashboard glow on screen -->
  <rect x="180" y="85" width="100" height="12" rx="2" fill="#3BB56D" opacity="0.4"/>
  <rect x="180" y="105" width="60" height="8" rx="2" fill="#3BB56D" opacity="0.2"/>
  <rect x="250" y="105" width="40" height="8" rx="2" fill="#5B6BC0" opacity="0.3"/>
  <rect x="180" y="122" width="235" height="55" rx="4" fill="#0f1450" stroke="#1e2660" stroke-width="0.5"/>
  <!-- Chart bars -->
  <rect x="195" y="155" width="16" height="18" rx="2" fill="#3BB56D" opacity="0.5"/>
  <rect x="218" y="145" width="16" height="28" rx="2" fill="#3BB56D" opacity="0.6"/>
  <rect x="241" y="138" width="16" height="35" rx="2" fill="#3BB56D" opacity="0.7"/>
  <rect x="264" y="130" width="16" height="43" rx="2" fill="#3BB56D" opacity="0.8"/>
  <rect x="287" y="148" width="16" height="25" rx="2" fill="#5B6BC0" opacity="0.4"/>
  <rect x="310" y="140" width="16" height="33" rx="2" fill="#5B6BC0" opacity="0.5"/>
  <rect x="333" y="150" width="16" height="23" rx="2" fill="#5B6BC0" opacity="0.35"/>
  <rect x="356" y="135" width="16" height="38" rx="2" fill="#3BB56D" opacity="0.6"/>
  <rect x="379" y="128" width="16" height="45" rx="2" fill="#3BB56D" opacity="0.85"/>
  <rect x="402" y="142" width="16" height="31" rx="2" fill="#5B6BC0" opacity="0.45"/>
  <!-- Monitor stand -->
  <rect x="270" y="225" width="60" height="8" rx="2" fill="#1a2158"/>
  <rect x="285" y="233" width="30" height="12" rx="3" fill="#151c50"/>
  <!-- Person silhouette -->
  <ellipse cx="300" cy="285" rx="45" ry="50" fill="#0a0f38" opacity="0.6"/>
  <circle cx="300" cy="242" r="22" fill="#0d1240" opacity="0.7"/>
  <!-- Coffee cup -->
  <rect x="440" y="240" width="28" height="22" rx="4" fill="#151c50" stroke="#1e2660" stroke-width="1"/>
  <path d="M468 248 Q478 248 478 255 Q478 262 468 262" fill="none" stroke="#1e2660" stroke-width="1"/>
  <rect x="443" y="243" width="22" height="3" rx="1" fill="#3BB56D" opacity="0.15"/>
  <!-- Notebook -->
  <rect x="100" y="250" width="50" height="35" rx="3" fill="#111850" stroke="#1e2660" stroke-width="0.8" transform="rotate(-5 125 267)"/>
  <line x1="110" y1="260" x2="140" y2="258" stroke="#1e2660" stroke-width="0.5"/>
  <line x1="110" y1="267" x2="140" y2="265" stroke="#1e2660" stroke-width="0.5"/>
  <line x1="110" y1="274" x2="135" y2="272" stroke="#1e2660" stroke-width="0.5"/>
  <!-- Ambient light particles -->
  <circle cx="90" cy="100" r="1.5" fill="#3BB56D" opacity="0.25"/>
  <circle cx="510" cy="80" r="1" fill="#3BB56D" opacity="0.2"/>
  <circle cx="50" cy="200" r="1.2" fill="#5B6BC0" opacity="0.15"/>
  <circle cx="540" cy="180" r="1.8" fill="#3BB56D" opacity="0.18"/>
  <!-- Label -->
  <text x="30" y="380" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#3BB56D" opacity="0.6" letter-spacing="0.08em">MOOD · AUTORIDADE CALMA</text>
</svg>