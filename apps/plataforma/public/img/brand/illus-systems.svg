<svg xmlns="http://www.w3.org/2000/svg" width="600" height="400" viewBox="0 0 600 400">
  <defs>
    <linearGradient id="bg4" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#010543"/>
      <stop offset="100%" stop-color="#0f1a68"/>
    </linearGradient>
    <linearGradient id="lineGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#3BB56D" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#5B6BC0" stop-opacity="0.4"/>
    </linearGradient>
    <filter id="glow4" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <radialGradient id="nodeGlow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#3BB56D" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#3BB56D" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="600" height="400" fill="url(#bg4)"/>
  <!-- Grid pattern -->
  <g stroke="#1e2660" stroke-width="0.3" stroke-opacity="0.3">
    <line x1="0" y1="50" x2="600" y2="50"/><line x1="0" y1="100" x2="600" y2="100"/>
    <line x1="0" y1="150" x2="600" y2="150"/><line x1="0" y1="200" x2="600" y2="200"/>
    <line x1="0" y1="250" x2="600" y2="250"/><line x1="0" y1="300" x2="600" y2="300"/>
    <line x1="0" y1="350" x2="600" y2="350"/>
    <line x1="50" y1="0" x2="50" y2="400"/><line x1="100" y1="0" x2="100" y2="400"/>
    <line x1="150" y1="0" x2="150" y2="400"/><line x1="200" y1="0" x2="200" y2="400"/>
    <line x1="250" y1="0" x2="250" y2="400"/><line x1="300" y1="0" x2="300" y2="400"/>
    <line x1="350" y1="0" x2="350" y2="400"/><line x1="400" y1="0" x2="400" y2="400"/>
    <line x1="450" y1="0" x2="450" y2="400"/><line x1="500" y1="0" x2="500" y2="400"/>
    <line x1="550" y1="0" x2="550" y2="400"/>
  </g>
  <!-- Connection lines -->
  <line x1="130" y1="120" x2="300" y2="200" stroke="url(#lineGrad)" stroke-width="2" stroke-linecap="round"/>
  <line x1="300" y1="200" x2="470" y2="130" stroke="url(#lineGrad)" stroke-width="2" stroke-linecap="round"/>
  <line x1="300" y1="200" x2="200" y2="300" stroke="url(#lineGrad)" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="300" y1="200" x2="430" y2="290" stroke="url(#lineGrad)" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="200" y1="300" x2="430" y2="290" stroke="#5B6BC0" stroke-width="1" stroke-opacity="0.2" stroke-dasharray="4 3"/>
  <line x1="130" y1="120" x2="200" y2="300" stroke="#5B6BC0" stroke-width="1" stroke-opacity="0.15" stroke-dasharray="4 3"/>
  <line x1="470" y1="130" x2="430" y2="290" stroke="#5B6BC0" stroke-width="1" stroke-opacity="0.15" stroke-dasharray="4 3"/>
  <!-- Node glows -->
  <circle cx="300" cy="200" r="30" fill="url(#nodeGlow)"/>
  <circle cx="130" cy="120" r="20" fill="url(#nodeGlow)"/>
  <circle cx="470" cy="130" r="20" fill="url(#nodeGlow)"/>
  <!-- Central hub node -->
  <circle cx="300" cy="200" r="18" fill="#0d1340" stroke="#3BB56D" stroke-width="2" stroke-opacity="0.7"/>
  <circle cx="300" cy="200" r="7" fill="#3BB56D" opacity="0.6"/>
  <!-- Top-left node -->
  <circle cx="130" cy="120" r="14" fill="#0d1340" stroke="#3BB56D" stroke-width="1.5" stroke-opacity="0.5"/>
  <rect x="119" y="112" width="22" height="16" rx="3" fill="none" stroke="#3BB56D" stroke-width="1" stroke-opacity="0.5"/>
  <!-- Top-right node -->
  <circle cx="470" cy="130" r="14" fill="#0d1340" stroke="#5B6BC0" stroke-width="1.5" stroke-opacity="0.5"/>
  <polygon points="470,120 478,132 462,132" fill="none" stroke="#5B6BC0" stroke-width="1" stroke-opacity="0.5"/>
  <!-- Bottom-left node -->
  <circle cx="200" cy="300" r="12" fill="#0d1340" stroke="#3BB56D" stroke-width="1.5" stroke-opacity="0.4"/>
  <circle cx="200" cy="300" r="5" fill="#3BB56D" opacity="0.4"/>
  <!-- Bottom-right node -->
  <circle cx="430" cy="290" r="12" fill="#0d1340" stroke="#5B6BC0" stroke-width="1.5" stroke-opacity="0.4"/>
  <rect x="423" y="283" width="14" height="14" rx="2" fill="none" stroke="#5B6BC0" stroke-width="1" stroke-opacity="0.4"/>
  <!-- Data flow particles -->
  <circle cx="215" cy="160" r="2.5" fill="#3BB56D" opacity="0.5"/>
  <circle cx="385" cy="165" r="2" fill="#5B6BC0" opacity="0.4"/>
  <circle cx="250" cy="250" r="2" fill="#3BB56D" opacity="0.35"/>
  <circle cx="365" cy="245" r="2.5" fill="#3BB56D" opacity="0.4"/>
  <circle cx="340" cy="160" r="1.5" fill="#5B6BC0" opacity="0.3"/>
  <circle cx="170" cy="210" r="1.5" fill="#3BB56D" opacity="0.25"/>
  <!-- Label -->
  <text x="30" y="380" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#3BB56D" opacity="0.6" letter-spacing="0.08em">ILLUSTRATION · SISTEMAS E CONEXÕES</text>
</svg>