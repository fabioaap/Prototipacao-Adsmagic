<svg xmlns="http://www.w3.org/2000/svg" width="120" height="120" viewBox="0 0 120 120">
  <defs>
    <linearGradient id="pictoGrad" x1="0" y1="1" x2="1" y2="0">
      <stop offset="0%" stop-color="#010543"/>
      <stop offset="100%" stop-color="#0d1340"/>
    </linearGradient>
    <linearGradient id="chartGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3BB56D"/>
      <stop offset="100%" stop-color="#111850"/>
    </linearGradient>
  </defs>
  <rect width="120" height="120" fill="url(#pictoGrad)"/>
  
  <!-- Grid base -->
  <path d="M20 90 L100 90" stroke="#1e2660" stroke-width="2" stroke-linecap="round"/>
  <path d="M25 90 L25 35" stroke="#1e2660" stroke-width="2" stroke-linecap="round" opacity="0.5"/>
  
  <!-- Bars -->
  <rect x="35" y="65" width="12" height="25" rx="2" fill="#5B6BC0" opacity="0.5"/>
  <rect x="55" y="50" width="12" height="40" rx="2" fill="#5B6BC0" opacity="0.8"/>
  <rect x="75" y="30" width="12" height="60" rx="2" fill="url(#chartGrad)"/>
  
  <!-- Growth Arrow -->
  <path d="M30 65 L55 45 L75 20" fill="none" stroke="#3BB56D" stroke-width="3" stroke-linecap="round"/>
  <path d="M60 20 L75 20 L75 35" fill="none" stroke="#3BB56D" stroke-width="3" stroke-linecap="round"/>
  
</svg>