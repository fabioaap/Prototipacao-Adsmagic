name: Deploy Workspace — GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            package-lock.json
            apps/plataforma/package-lock.json
            workspace/docs/package-lock.json

      - name: Install root dependencies
        run: npm ci

      - name: Install Plataforma dependencies
        run: npm ci --prefix apps/plataforma

      - name: Install docs dependencies
        run: npm ci --prefix workspace/docs

      - name: Build workspace artifact
        run: npm run build
        env:
          WORKSPACE_BASE_PATH: /Prototipacao-Adsmagic/
          DOCS_BASE_PATH: /Prototipacao-Adsmagic/wiki/
          SITE_URL: https://fabioaap.github.io
          WORKSPACE_URL: https://fabioaap.github.io/Prototipacao-Adsmagic/

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
