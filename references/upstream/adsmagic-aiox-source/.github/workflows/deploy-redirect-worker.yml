name: Deploy Redirect Worker

on:
  push:
    branches:
      - main
    paths:
      - 'back-end/redirect-worker/**'
      - '.github/workflows/deploy-redirect-worker.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        working-directory: back-end/redirect-worker
        run: npm install

      - name: Typecheck
        working-directory: back-end/redirect-worker
        run: npm run typecheck

      - name: Deploy worker
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: back-end/redirect-worker
          command: deploy
