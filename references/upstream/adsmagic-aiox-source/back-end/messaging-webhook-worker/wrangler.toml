name = "adsmagic-messaging-webhook"
main = "src/index.ts"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]

# Queue bindings
[[queues.producers]]
queue = "messaging-webhooks"
binding = "MESSAGING_WEBHOOKS_QUEUE"

[[queues.consumers]]
queue = "messaging-webhooks"
max_batch_size = 1
max_retries = 3
dead_letter_queue = "messaging-webhooks-dlq"

[observability]
[observability.logs]
enabled = false
invocation_logs = true

# Environment variables (set via `wrangler secret put`)
# SUPABASE_URL
# SUPABASE_SERVICE_ROLE_KEY
