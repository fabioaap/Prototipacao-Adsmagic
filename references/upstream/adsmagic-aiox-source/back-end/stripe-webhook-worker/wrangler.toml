name = "adsmagic-stripe-webhook"
main = "src/index.ts"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]

# Queue bindings
[[queues.producers]]
queue = "stripe-events"
binding = "STRIPE_EVENTS_QUEUE"

[[queues.consumers]]
queue = "stripe-events"
max_batch_size = 1
max_retries = 3
dead_letter_queue = "stripe-events-dlq"

[observability]
[observability.logs]
enabled = false
invocation_logs = true

# Environment variables (set via `wrangler secret put`)
# STRIPE_WEBHOOK_SECRET
# STRIPE_SECRET_KEY
# SUPABASE_URL
# SUPABASE_SERVICE_ROLE_KEY
