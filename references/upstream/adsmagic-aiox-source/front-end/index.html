<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Plataforma de atribuição de marketing e gestão de leads" />
    <meta property="og:title" content="AdsMagic" />
    <meta property="og:description" content="Atribuição de marketing e gestão de leads" />
    <meta property="og:type" content="website" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <title>AdsMagic - Marketing Attribution</title>
    <style>
      body.boot-loading {
        margin: 0;
        background: #f7f8fa;
      }

      body.boot-loading #app {
        visibility: hidden;
      }

      #app-boot-splash {
        position: fixed;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #f7f8fa;
        z-index: 9999;
        transition: opacity 180ms ease;
      }

      #app-boot-splash.is-hidden {
        opacity: 0;
        pointer-events: none;
      }

      .boot-spinner {
        width: 34px;
        height: 34px;
        border-radius: 9999px;
        border: 3px solid #d8dde6;
        border-top-color: #1f6feb;
        animation: boot-spin 0.8s linear infinite;
      }

      @keyframes boot-spin {
        to { transform: rotate(360deg); }
      }
    </style>
  </head>
  <body class="boot-loading">
    <div id="app-boot-splash" aria-hidden="true">
      <div class="boot-spinner"></div>
    </div>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
