name: Deploy to Cloudflare Pages

on:
  push:
    branches:
      - main
      - master
      - fix/bugfixes
    paths:
      - 'front-end/**'
      - '.github/workflows/deploy-cloudflare.yml'
  workflow_dispatch:
    inputs:
      branch:
        description: 'Branch to deploy'
        required: false
        default: 'main'
        type: choice
        options:
          - main
          - master
          - fix/bugfixes

jobs:
  deploy:
    name: Deploy to Cloudflare Pages
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    
    defaults:
      run:
        working-directory: front-end
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 8
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'pnpm'
          cache-dependency-path: front-end/pnpm-lock.yaml
      
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      
      - name: Build project
        run: pnpm build
        env:
          # Variáveis de ambiente para build
          # Valores reais devem estar configurados no Cloudflare Pages
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          VITE_API_BASE_URL: ${{ secrets.VITE_API_BASE_URL }}
      
      - name: Install Wrangler CLI
        run: pnpm add -g wrangler
      
      - name: Deploy to Cloudflare Pages
        run: wrangler pages deploy dist --project-name=adsmagic-frontend
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      
      - name: Deployment summary
        if: success()
        run: |
          echo "✅ Deploy concluído com sucesso!"
          echo "🌐 Acesse: https://adsmagic-frontend.pages.dev"

